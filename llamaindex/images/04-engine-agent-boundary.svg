<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker></defs>
  <rect width="960" height="420" fill="#0f172a"/>
  <text x="32" y="42" fill="#e2e8f0" font-family="Consolas, monospace" font-size="20" font-weight="700">QueryEngine / ChatEngine / Agent</text>
  <text x="32" y="68" fill="#94a3b8" font-family="Consolas, monospace" font-size="12">Choose the simplest interface that matches the job.</text>
  <g font-family="Consolas, monospace" text-anchor="middle">
    <rect x="55" y="135" width="220" height="120" rx="8" fill="#062f3c" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="165" y="176" fill="#fff" font-size="15" font-weight="700">QueryEngine</text>
    <text x="165" y="202" fill="#94a3b8" font-size="11">single-turn Q&A</text>
    <text x="165" y="222" fill="#94a3b8" font-size="11">stable retrieval path</text>
    <rect x="370" y="135" width="220" height="120" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
    <text x="480" y="176" fill="#fff" font-size="15" font-weight="700">ChatEngine</text>
    <text x="480" y="202" fill="#94a3b8" font-size="11">multi-turn dialogue</text>
    <text x="480" y="222" fill="#94a3b8" font-size="11">conversation memory</text>
    <rect x="685" y="135" width="220" height="120" rx="8" fill="#4c1d95" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="795" y="176" fill="#fff" font-size="15" font-weight="700">Agent</text>
    <text x="795" y="202" fill="#94a3b8" font-size="11">tool selection</text>
    <text x="795" y="222" fill="#94a3b8" font-size="11">task planning</text>
    <path d="M275 195 L370 195" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
    <path d="M590 195 L685 195" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
    <rect x="150" y="315" width="660" height="54" rx="8" fill="#1e293b" stroke="#94a3b8"/>
    <text x="480" y="338" fill="#e2e8f0" font-size="12" font-weight="700">Engineering rule</text>
    <text x="480" y="356" fill="#94a3b8" font-size="10">Do not introduce Agent until QueryEngine or ChatEngine cannot express the workflow.</text>
  </g>
</svg>
