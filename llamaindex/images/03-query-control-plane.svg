<svg xmlns="http://www.w3.org/2000/svg" width="940" height="500" viewBox="0 0 940 500">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="940" height="500" fill="#0f172a"/>
  <rect width="940" height="500" fill="url(#grid)"/>
  <text x="28" y="34" fill="#e2e8f0" font-family="Consolas, monospace" font-size="18" font-weight="700">Retriever as the RAG Control Plane</text>
  <text x="28" y="56" fill="#94a3b8" font-family="Consolas, monospace" font-size="11">QueryEngine hides the path. Production systems should inspect and configure retrieval.</text>

  <g font-family="Consolas, monospace" text-anchor="middle">
    <rect x="55" y="112" width="140" height="70" rx="7" fill="#0f172a"/>
    <rect x="55" y="112" width="140" height="70" rx="7" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="125" y="142" fill="#fff" font-size="12" font-weight="700">Question</text>
    <text x="125" y="160" fill="#94a3b8" font-size="9">user input</text>

    <rect x="295" y="90" width="150" height="114" rx="7" fill="#0f172a"/>
    <rect x="295" y="90" width="150" height="114" rx="7" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="370" y="122" fill="#fff" font-size="12" font-weight="700">Retriever</text>
    <text x="370" y="144" fill="#94a3b8" font-size="9">top_k</text>
    <text x="370" y="161" fill="#94a3b8" font-size="9">metadata filters</text>
    <text x="370" y="178" fill="#94a3b8" font-size="9">retriever mode</text>

    <rect x="545" y="90" width="150" height="114" rx="7" fill="#0f172a"/>
    <rect x="545" y="90" width="150" height="114" rx="7" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
    <text x="620" y="122" fill="#fff" font-size="12" font-weight="700">Postprocessor</text>
    <text x="620" y="144" fill="#94a3b8" font-size="9">similarity cutoff</text>
    <text x="620" y="161" fill="#94a3b8" font-size="9">rerank</text>
    <text x="620" y="178" fill="#94a3b8" font-size="9">transform nodes</text>

    <rect x="775" y="112" width="130" height="70" rx="7" fill="#0f172a"/>
    <rect x="775" y="112" width="130" height="70" rx="7" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="840" y="142" fill="#fff" font-size="12" font-weight="700">Synthesizer</text>
    <text x="840" y="160" fill="#94a3b8" font-size="9">compact/refine</text>

    <path d="M195 147 L295 147" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
    <path d="M445 147 L545 147" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
    <path d="M695 147 L775 147" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>

    <g transform="translate(312,285)">
      <rect x="0" y="10" width="116" height="62" rx="2" fill="#0f172a"/>
      <ellipse cx="58" cy="10" rx="58" ry="12" fill="#0f172a"/>
      <ellipse cx="58" cy="72" rx="58" ry="12" fill="#0f172a"/>
      <rect x="0" y="10" width="116" height="62" fill="rgba(76,29,149,0.4)"/>
      <ellipse cx="58" cy="10" rx="58" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
      <ellipse cx="58" cy="72" rx="58" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
      <line x1="0" y1="10" x2="0" y2="72" stroke="#a78bfa" stroke-width="1.5"/>
      <line x1="116" y1="10" x2="116" y2="72" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="58" y="42" fill="#fff" font-size="11" font-weight="700">Vector Index</text>
    </g>
    <path d="M370 204 L370 285" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
    <path d="M430 330 L545 204" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>

    <rect x="165" y="405" width="610" height="52" rx="7" fill="#0f172a"/>
    <rect x="165" y="405" width="610" height="52" rx="7" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
    <text x="470" y="427" fill="#e2e8f0" font-size="12" font-weight="700">Debug order</text>
    <text x="470" y="445" fill="#94a3b8" font-size="10">retrieved nodes -> scores and metadata -> synthesized answer</text>
  </g>
</svg>
